version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "=== Installing dependencies ==="
      - pip install boto3 pytest --quiet

  pre_build:
    commands:
      - echo "=== Running Unit Tests ==="
      - python -m pytest tests/ -v --tb=short
      - echo "=== All tests passed! ==="

  build:
    commands:
      - echo "=== Packaging Lambda function ==="
      - cd lambda
      - zip -r ../lambda_package.zip lambda_function.py
      - cd ..
      - ls -lh lambda_package.zip

  post_build:
    commands:
      - echo "=== Build complete at $(date) ==="

artifacts:
  files:
    - lambda_package.zip
    - buildspec/deploy.yml
    - buildspec/verify.yml
  discard-paths: no
